<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Society Lockers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:      #0A6B3A;
            --green-dk:   #06522C;
            --green-soft: #E7F0EA;
            --green-band: #F2F7F3;

            --cherry:    #C4213B;
            --cherry-dk: #8B1828;

            --ink:      #222;
            --ink-soft: #6B6B6B;
            --paper:    #FFFFFF;
            --bg:       #FAFAFA;
            --line:     #E4E4E4;
            --line-soft:#EFEFEF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--bg); }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
        }

        .wrap {
            max-width: 880px;
            margin: 0 auto;
            padding: 18px 18px 48px;
        }

        /* ── Landing ───────────────────────────────── */
        #landing {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .landing-card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-top: 4px solid var(--green);
            border-radius: 6px;
            padding: 40px 32px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            animation: fadeUp 0.4s ease both;
        }
        .landing-icon {
            width: 56px; height: 56px; margin: 0 auto 14px;
            border-radius: 50%; background: var(--green-soft);
            display: flex; align-items: center; justify-content: center;
            color: var(--green); font-size: 24px;
        }
        .landing-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 28px;
            color: var(--green-dk);
            letter-spacing: 0.01em;
        }
        .landing-card .sub {
            font-size: 13px;
            color: var(--ink-soft);
            margin: 6px 0 24px;
            letter-spacing: 0.02em;
        }
        #mform { display: flex; flex-direction: column; gap: 10px; }
        #minput {
            width: 100%;
            padding: 12px 16px;
            text-align: center;
            font: 400 15px 'Inter', sans-serif;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #minput:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(10,107,58,0.15);
        }
        #mbtn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: var(--green);
            color: #fff;
            font: 600 14px 'Inter', sans-serif;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        #mbtn:hover { background: var(--green-dk); }
        #mbtn:active { transform: scale(0.99); }
        #mbtn:disabled { background: #aaa; cursor: not-allowed; }
        #merror {
            background: #FDECEE;
            color: var(--cherry-dk);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            display: none;
            animation: shake 0.4s;
        }
        .hint {
            font-size: 12px;
            color: var(--ink-soft);
            margin-top: 6px;
        }

        /* Matches list */
        #matches-list {
            display: none;
            text-align: left;
            margin-top: 4px;
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }
        .match-item {
            padding: 11px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--line-soft);
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            transition: background 0.1s;
            font-size: 14px;
        }
        .match-item:last-child { border-bottom: none; }
        .match-item:hover { background: var(--green-soft); }
        .match-item .match-name { font-weight: 600; color: var(--ink); }
        .match-item .match-bottles { font-size: 12px; color: var(--ink-soft); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Locker view ───────────────────────────── */
        #locker { display: none; animation: fadeUp 0.35s ease both; }

        .hdr {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
            color: #fff;
            padding: 18px 22px;
            border-radius: 6px;
            position: relative;
            margin-bottom: 14px;
        }
        .hdr::after {
            content: '';
            position: absolute; left: 0; right: 0; bottom: 0;
            height: 3px;
            background: var(--cherry);
            border-radius: 0 0 6px 6px;
        }
        .hdr-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 12px; margin-bottom: 10px;
        }
        .hdr-title h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 26px;
            line-height: 1.1;
            letter-spacing: 0.01em;
        }
        .hdr-title .mem {
            margin-top: 4px;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        .back {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            padding: 7px 13px;
            border-radius: 4px;
            font: 500 12px 'Inter', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.15s;
        }
        .back:hover { background: rgba(255,255,255,0.25); }

        .hdr-stats { display: flex; gap: 6px; flex-wrap: wrap; }
        .stat {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .stat.total {
            background: var(--cherry);
            border-color: var(--cherry-dk);
            font-weight: 600;
        }
        .stat .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* ── Toolbar ───────────────────────────────── */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255,255,255,0.96);
            backdrop-filter: saturate(140%) blur(8px);
            -webkit-backdrop-filter: saturate(140%) blur(8px);
            padding: 12px 0 10px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 4px;
        }
        .search {
            position: relative;
            margin-bottom: 10px;
        }
        .search input {
            width: 100%;
            padding: 11px 38px 11px 38px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            font: 400 14px 'Inter', sans-serif;
            color: var(--ink);
        }
        .search input::placeholder { color: var(--ink-soft); }
        .search input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(10,107,58,0.15);
        }
        .search .ic-l {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: var(--ink-soft); font-size: 13px; pointer-events: none;
        }
        .search .clr {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 24px; height: 24px; border: none;
            background: var(--bg); color: var(--ink-soft);
            border-radius: 50%; cursor: pointer;
            display: none; font-size: 11px;
            align-items: center; justify-content: center;
        }
        .search.has-val .clr { display: inline-flex; }

        .tb-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .seg {
            display: flex; gap: 3px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 3px;
            flex: 1 1 260px;
            min-width: 240px;
        }
        .seg button {
            flex: 1; border: none; background: transparent;
            padding: 8px 6px;
            border-radius: 4px;
            font: 600 12px 'Inter', sans-serif;
            color: var(--ink-soft);
            cursor: pointer;
            letter-spacing: 0.02em;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            transition: background 0.15s, color 0.15s;
        }
        .seg button:hover { color: var(--green-dk); }
        .seg button .dot { width: 7px; height: 7px; border-radius: 50%; }
        .seg button[data-type="Red"]   .dot { background: var(--cherry); }
        .seg button[data-type="White"] .dot { background: #D9BE7A; border: 1px solid #b3972f; }
        .seg button[data-type="Other"] .dot { background: #B48A6C; }
        .seg button.active {
            background: var(--green);
            color: #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .seg button.active:hover { color: #fff; }
        .seg button.active .dot { background: #fff !important; border-color: transparent !important; }
        .seg button .c {
            font-size: 11px;
            opacity: 0.7;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .view-toggle {
            display: inline-flex;
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
        }
        .view-toggle button {
            border: none;
            background: #fff;
            padding: 8px 12px;
            color: var(--ink-soft);
            cursor: pointer;
            font: 500 12px 'Inter', sans-serif;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .view-toggle button + button { border-left: 1px solid var(--line); }
        .view-toggle button:hover { background: var(--green-band); color: var(--green-dk); }
        .view-toggle button.active {
            background: var(--green);
            color: #fff;
        }

        /* Meta row */
        .meta {
            padding: 10px 2px 8px;
            font-size: 12px;
            color: var(--ink-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .meta strong { color: var(--green-dk); font-weight: 600; }
        .meta .clear-all {
            background: none; border: none;
            color: var(--cherry);
            text-decoration: underline;
            cursor: pointer;
            font: 500 12px 'Inter', sans-serif;
            padding: 0;
        }

        /* ── Category section ──────────────────────── */
        .section { margin-top: 10px; }
        .cat-hdr {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px;
            background: var(--green-band);
            border: 1px solid #DCE6DF;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .cat-hdr:hover { background: #EAF1EC; }
        .cat-title {
            font: 700 13px 'Inter', sans-serif;
            color: var(--green-dk);
            letter-spacing: 0.02em;
            display: flex; align-items: center; gap: 8px;
        }
        .cat-title .dot { width: 8px; height: 8px; border-radius: 50%; }
        .cat-title[data-cat="Red"]   .dot { background: var(--cherry); }
        .cat-title[data-cat="White"] .dot { background: #D9BE7A; border: 1px solid #b3972f; }
        .cat-title[data-cat="Other"] .dot { background: #B48A6C; }
        .cat-title em {
            font-style: italic; font-weight: 500;
            color: var(--green-dk); opacity: 0.8;
        }
        .cat-meta {
            font-size: 11px;
            color: var(--green-dk);
            display: flex; align-items: center; gap: 8px;
            font-weight: 600;
        }
        .cat-meta .chev { transition: transform 0.25s; font-size: 10px; opacity: 0.7; }
        .section.collapsed .chev { transform: rotate(-90deg); }
        .section.collapsed .items { display: none; }
        .section.collapsed .cat-hdr {
            border-radius: 4px;
            border-bottom: 1px solid #DCE6DF;
        }

        .items {
            border: 1px solid var(--line);
            border-top: none;
            border-radius: 0 0 4px 4px;
            background: #fff;
        }

        /* ── Wine row (list view) ──────────────────── */
        .item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            padding: 11px 16px;
            border-bottom: 1px solid var(--line-soft);
            align-items: center;
            transition: background 0.1s;
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background: #FAFBFA; }
        .item .name {
            font: 600 14px 'Inter', sans-serif;
            color: var(--ink);
            line-height: 1.25;
            overflow-wrap: anywhere;
        }
        .item .sub {
            margin-top: 2px;
            font-size: 12px;
            color: var(--ink-soft);
            display: flex; flex-wrap: wrap; gap: 4px 8px;
            align-items: center;
        }
        .item .sub em { font-style: italic; }
        .item .sub .yr {
            color: var(--cherry);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-style: normal;
        }
        .item .btls {
            font: 700 16px 'Inter', sans-serif;
            color: var(--cherry);
            text-align: center;
            min-width: 48px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .item .btls small {
            display: block;
            font-size: 9px;
            color: var(--ink-soft);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 3px;
        }

        /* ── Grid view ─────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 8px;
            padding: 10px;
        }
        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-left: 3px solid var(--green);
            border-radius: 6px;
            padding: 12px 14px;
            position: relative;
            transition: box-shadow 0.15s, transform 0.1s;
        }
        .card[data-type="Red"]   { border-left-color: var(--cherry); }
        .card[data-type="White"] { border-left-color: #b3972f; }
        .card[data-type="Other"] { border-left-color: #B48A6C; }
        .card:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .card .name {
            font: 600 14px 'Inter', sans-serif;
            color: var(--ink);
            line-height: 1.25;
            padding-right: 44px;
            margin-bottom: 4px;
            overflow-wrap: anywhere;
        }
        .card .sub {
            font-size: 12px;
            color: var(--ink-soft);
            display: flex; flex-wrap: wrap; gap: 4px 8px; align-items: center;
        }
        .card .sub em { font-style: italic; }
        .card .sub .yr {
            color: var(--cherry);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-style: normal;
        }
        .card .btls {
            position: absolute;
            top: 10px; right: 10px;
            background: #FDECEE;
            color: var(--cherry-dk);
            border: 1px solid #F7D3D8;
            border-radius: 999px;
            font: 700 12px 'Inter', sans-serif;
            padding: 2px 10px;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ── Empty / loading ───────────────────────── */
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--ink-soft);
            background: #fff;
            border: 1px dashed var(--line);
            border-radius: 6px;
            margin: 16px 0;
        }
        .empty i { font-size: 28px; color: var(--green); margin-bottom: 10px; display: block; }
        .empty h3 { font: 600 16px 'Inter', sans-serif; color: var(--green-dk); margin-bottom: 4px; }
        .empty p { font-size: 13px; }
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--ink-soft);
        }
        .loader {
            border: 3px solid var(--line);
            border-top-color: var(--green);
            border-radius: 50%;
            width: 36px; height: 36px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 14px;
        }

        /* ── Responsive ────────────────────────────── */
        @media (max-width: 640px) {
            .wrap { padding: 12px 12px 32px; }
            .hdr { padding: 16px; }
            .hdr-top { flex-direction: column-reverse; align-items: stretch; }
            .back { align-self: flex-start; }
            .hdr-title h2 { font-size: 22px; }
            .toolbar { padding: 10px 0 8px; }
            .tb-row { flex-direction: column; align-items: stretch; gap: 8px; }
            .seg { flex: 1 1 auto; min-width: 0; }
            .seg button { padding: 9px 4px; font-size: 11px; }
            .seg button .c { display: none; }
            .view-toggle { width: 100%; }
            .view-toggle button { flex: 1; justify-content: center; }
            .view-toggle button span { display: none; }
            .grid { grid-template-columns: 1fr; padding: 8px; }
            .item { padding: 11px 12px; }
            .item .name { font-size: 13px; }
            .item .sub { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- Landing -->
    <div id="landing">
        <div class="landing-card">
            <div class="landing-icon"><i class="fas fa-wine-glass-alt"></i></div>
            <h1>Wine Society Lockers</h1>
            <p class="sub">Enter your member number to view your locker inventory</p>
            <form id="mform" autocomplete="off">
                <input type="text" id="minput" placeholder="Member # (first 3 digits only)"
                       inputmode="numeric" pattern="[0-9]*" maxlength="3"
                       autocorrect="off" autocapitalize="off" spellcheck="false">
                <div id="matches-list"></div>
                <button type="submit" id="mbtn">
                    View My Locker &nbsp;<i class="fas fa-arrow-right"></i>
                </button>
                <div id="merror"></div>
                <p class="hint" id="loading-hint">Loading directory data...</p>
            </form>
        </div>
    </div>

    <!-- Locker -->
    <div id="locker">
        <div class="hdr">
            <div class="hdr-top">
                <div class="hdr-title">
                    <h2 id="m-name"></h2>
                    <div class="mem" id="m-sub">Wine Locker</div>
                </div>
                <button class="back" id="back"><i class="fas fa-chevron-left"></i> All Lockers</button>
            </div>
            <div class="hdr-stats" id="m-stats"></div>
        </div>

        <div class="toolbar">
            <div class="search" id="search-wrap">
                <i class="fas fa-magnifying-glass ic-l"></i>
                <input id="s" type="text"
                       placeholder="Search by wine, varietal, year..." autocomplete="off">
                <button class="clr" id="sc" aria-label="Clear"><i class="fas fa-times"></i></button>
            </div>
            <div class="tb-row">
                <div class="seg" id="seg">
                    <button class="active" data-type="All">All <span class="c" data-c="All"></span></button>
                    <button data-type="Red"><span class="dot"></span>Red <span class="c" data-c="Red"></span></button>
                    <button data-type="White"><span class="dot"></span>White <span class="c" data-c="White"></span></button>
                    <button data-type="Other"><span class="dot"></span>Other <span class="c" data-c="Other"></span></button>
                </div>
                <div class="view-toggle" role="tablist" aria-label="View">
                    <button class="active" data-view="list" title="List">
                        <i class="fas fa-list-ul"></i><span>&nbsp;List</span>
                    </button>
                    <button data-view="grid" title="Grid">
                        <i class="fas fa-table-cells-large"></i><span>&nbsp;Grid</span>
                    </button>
                </div>

            </div>
            <div id="locker-content"></div>
        </div>

        <div class="meta" id="meta"></div>
        <div id="content"></div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── Elements ──────────────────────────────────────
    const landing     = document.getElementById('landing');
    const lockerEl    = document.getElementById('locker');
    const mform       = document.getElementById('mform');
    const minput      = document.getElementById('minput');
    const merror      = document.getElementById('merror');
    const mbtn        = document.getElementById('mbtn');
    const matchesList = document.getElementById('matches-list');
    const loadingHint = document.getElementById('loading-hint');
    const backBtn     = document.getElementById('back');
    const mNameEl     = document.getElementById('m-name');
    const mSubEl      = document.getElementById('m-sub');
    const mStatsEl    = document.getElementById('m-stats');
    const seg         = document.getElementById('seg');
    const sEl         = document.getElementById('s');
    const sw          = document.getElementById('search-wrap');
    const sc          = document.getElementById('sc');
    const metaEl      = document.getElementById('meta');
    const contentEl   = document.getElementById('content');
    const viewBtns    = document.querySelectorAll('.view-toggle button');

    // ── App state ─────────────────────────────────────
    let wineData      = [];   // directory entries
    let varietalTypeMap = {};
    let currentWines  = [];   // wines for currently open locker
    const state = { search: '', type: 'All', view: 'list', collapsed: new Set() };

    // ── Varietal → type mapping ───────────────────────
    function loadVarietalMapping() {
        return fetch('winevarietals.json')
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                (data.value || data).forEach(item => {
                    if (item.Varietal) {
                        varietalTypeMap[item.Varietal.toLowerCase()] = item.Type || 'Other';
                    }
                });
            })
            .catch(() => {});
    }

    function getWineType(varietal) {
        if (varietal && varietal.trim() && varietal !== 'N/A') {
            const t = varietalTypeMap[varietal.toLowerCase()];
            if (t) return t;
        }
        return 'Other';
    }

    function normalizeWines(data) {
        return (data || [])
            .map(item => ({
                name:     (item.Wine || '').trim() || 'Unknown',
                varietal: (item.Varietal || '').trim() || 'N/A',
                year:     item.Year === '' || item.Year == null ? null
                              : (isFinite(+item.Year) ? +item.Year : item.Year),
                bottles:  Number(item.Bottles) || 0,
                type:     getWineType((item.Varietal || '').trim())
            }))
            .filter(w => w.bottles > 0);
    }

    // ── Directory loading ─────────────────────────────
    loadVarietalMapping().then(() => {
        return fetch('Table_Directory.json');
    }).then(r => {
        if (!r.ok) throw new Error('Could not load directory.');
        return r.json();
    }).then(data => {
        if (data.value && Array.isArray(data.value)) {
            wineData = data.value;
        } else if (Array.isArray(data)) {
            wineData = data;
        } else {
            wineData = Object.values(data);
        }
        // Sort alphabetically by last name
        wineData.sort((a, b) => {
            const lastName = n => { const p = (n || '').split(' '); return p[p.length - 1]; };
            return lastName(a['Sheet Name']).localeCompare(lastName(b['Sheet Name']));
        });
        loadingHint.textContent = wineData.length + ' members loaded';
        setTimeout(() => { loadingHint.style.display = 'none'; }, 2000);
        minput.disabled = false;
        mbtn.disabled = false;
        mbtn.innerHTML = 'View My Locker &nbsp;<i class="fas fa-arrow-right"></i>';
        minput.focus();
    }).catch(err => {
        loadingHint.textContent = 'Could not load directory: ' + err.message;
        loadingHint.style.color = '#c00';
    });

    // Disable inputs while loading
    minput.disabled = true;
    mbtn.disabled = true;
    mbtn.innerHTML = '<div class="loader" style="width:18px;height:18px;border-width:2px;margin:0 auto;"></div>';

    // ── Landing form ──────────────────────────────────
    minput.addEventListener('input', () => {
        clearError();
        matchesList.style.display = 'none';
        matchesList.innerHTML = '';
        const q = minput.value.trim();
        if (q.length === 3 && wineData.length > 0) {
            const member = wineData.find(m => (m['Mem_x0023_'] || '').substring(0, 3) === q);
            if (member) openLocker(member);
            else showError('Member number not found. Please try again.');
        }
    });

    mform.addEventListener('submit', e => {
        e.preventDefault();
        const q = minput.value.trim();
        if (!q) { showError('Please enter your member number.'); return; }
        const member = wineData.find(m => (m['Mem_x0023_'] || '').substring(0, 3) === q);
        if (!member) { showError('Member number not found. Please try again.'); return; }
        openLocker(member);
    });

    function showError(msg) {
        merror.textContent = msg;
        merror.style.display = 'block';
        merror.style.animation = 'none';
        merror.offsetHeight;
        merror.style.animation = '';
    }
    function clearError() { merror.style.display = 'none'; merror.textContent = ''; }

    // ── Open a locker ─────────────────────────────────
    function openLocker(lockerEntry) {
        const name = lockerEntry['Sheet Name'] || 'Unknown';
        mNameEl.textContent = name;
        mSubEl.textContent  = 'Wine Locker';
        mStatsEl.innerHTML  = '';
        contentEl.innerHTML = '<div class="loading"><div class="loader"></div><p>Loading inventory…</p></div>';
        metaEl.innerHTML    = '';

        landing.style.display  = 'none';
        lockerEl.style.display = 'block';
        lockerEl.style.animation = 'none';
        lockerEl.offsetHeight;
        lockerEl.style.animation = '';

        resetFilters();

        const formattedName = name.replace(/\s+/g, '_');
        fetch(`Table_${formattedName}.json`)
            .then(r => {
                if (!r.ok) throw new Error(`Could not load data for ${name}.`);
                return r.json();
            })
            .then(data => {
                currentWines = normalizeWines(Array.isArray(data) ? data : (data.value || []));
                updateHeaderStats();
                render();
            })
            .catch(err => {
                contentEl.innerHTML = `<div class="empty">
                    <i class="fas fa-wine-glass"></i>
                    <h3>Couldn't load locker</h3>
                    <p>${esc(err.message)}</p>
                </div>`;
            });
    }

    function updateHeaderStats() {
        const reds   = currentWines.filter(w => w.type === 'Red')  .reduce((s,w) => s + w.bottles, 0);
        const whites = currentWines.filter(w => w.type === 'White').reduce((s,w) => s + w.bottles, 0);
        const others = currentWines.filter(w => w.type === 'Other').reduce((s,w) => s + w.bottles, 0);
        const total  = reds + whites + others;

        document.querySelector('[data-c="All"]').textContent   = '(' + total  + ')';
        document.querySelector('[data-c="Red"]').textContent   = '(' + reds   + ')';
        document.querySelector('[data-c="White"]').textContent = '(' + whites + ')';
        document.querySelector('[data-c="Other"]').textContent = '(' + others + ')';

        mStatsEl.innerHTML = [
            `<div class="stat total"><i class="fas fa-wine-bottle"></i> ${total} bottle${total===1?'':'s'}</div>`,
            reds   ? `<div class="stat"><span class="dot" style="background:#F5A3AE"></span>${reds} Red</div>`   : '',
            whites ? `<div class="stat"><span class="dot" style="background:#EBD9A0"></span>${whites} White</div>` : '',
            others ? `<div class="stat"><span class="dot" style="background:#D8BD9E"></span>${others} Other</div>` : ''
        ].filter(Boolean).join('');
    }

    // ── Back to landing ───────────────────────────────
    backBtn.addEventListener('click', () => {
        lockerEl.style.display = 'none';
        landing.style.display  = '';
        currentWines = [];
        minput.value = '';
        matchesList.style.display = 'none';
        clearError();
        minput.focus();
    });

    // ── Toolbar controls ──────────────────────────────
    sEl.addEventListener('input', () => {
        state.search = sEl.value;
        sw.classList.toggle('has-val', !!sEl.value);
        render();
    });
    sc.addEventListener('click', () => {
        sEl.value = ''; state.search = '';
        sw.classList.remove('has-val');
        sEl.focus();
        render();
    });
    seg.addEventListener('click', e => {
        const b = e.target.closest('button');
        if (!b) return;
        seg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
        state.type = b.dataset.type;
        render();
    });
    viewBtns.forEach(b => b.addEventListener('click', () => {
        state.view = b.dataset.view;
        viewBtns.forEach(x => x.classList.toggle('active', x === b));
        render();
    }));

    function resetFilters() {
        state.search    = '';
        state.type      = 'All';
        state.collapsed = new Set();
        sEl.value       = '';
        sw.classList.remove('has-val');
        seg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x.dataset.type === 'All'));
        viewBtns.forEach(x => x.classList.toggle('active', x.dataset.view === 'list'));
        state.view = 'list';
    }

    function filterWines(ws) {
        const s = state.search.trim().toLowerCase();
        return ws.filter(w => {
            if (state.type !== 'All' && w.type !== state.type) return false;
            if (s) {
                const hay = (w.name + ' ' + w.varietal + ' ' + (w.year || '')).toLowerCase();
                if (!hay.includes(s)) return false;
            }
            return true;
        });
    }

    // ── Render locker content ─────────────────────────
    function render() {
        if (!currentWines.length) return;

        const f   = [...filterWines(currentWines)].sort((a,b) => a.name.localeCompare(b.name));
        const t   = f.reduce((s,w) => s + w.bottles, 0);
        const any = state.search || state.type !== 'All';

        metaEl.innerHTML = `<span><strong>${t}</strong> bottle${t===1?'':'s'} · ${f.length} label${f.length===1?'':'s'}</span>`
            + (any ? `<button class="clear-all" id="ca">Clear filters</button>` : '');

        const ca = document.getElementById('ca');
        if (ca) ca.addEventListener('click', () => {
            state.search = ''; state.type = 'All';
            sEl.value = ''; sw.classList.remove('has-val');
            seg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x.dataset.type === 'All'));
            render();
        });

        if (!f.length) {
            contentEl.innerHTML = `<div class="empty">
                <i class="fas fa-wine-glass"></i>
                <h3>No wines match</h3>
                <p>Try clearing your search or filter.</p>
            </div>`;
            return;
        }

        const order = state.type === 'All' ? ['Red','White','Other'] : [state.type];
        contentEl.innerHTML = order.map(cat => {
            const ws = f.filter(w => w.type === cat);
            if (!ws.length) return '';
            const bt  = ws.reduce((s,w) => s + w.bottles, 0);
            const cls = state.collapsed.has(cat) ? 'section collapsed' : 'section';
            const label = cat === 'Other' ? 'Sparkling &amp; Other' : cat + ' Wines';

            const body = state.view === 'grid'
                ? `<div class="grid">${ws.map(w => `
                    <div class="card" data-type="${cat}">
                        <div class="btls">${w.bottles}</div>
                        <div class="name">${esc(w.name)}</div>
                        <div class="sub">
                            <em>${esc(w.varietal)}</em>
                            ${w.year ? `<span class="yr">${w.year}</span>` : ''}
                        </div>
                    </div>`).join('')}</div>`
                : ws.map(w => `
                    <div class="item">
                        <div>
                            <div class="name">${esc(w.name)}</div>
                            <div class="sub">
                                <em>${esc(w.varietal)}</em>${w.year ? ` · <span class="yr">${w.year}</span>` : ''}
                            </div>
                        </div>
                        <div class="btls">${w.bottles}<small>${w.bottles===1?'bottle':'bottles'}</small></div>
                    </div>`).join('');

            return `<div class="${cls}" data-cat="${cat}">
                <div class="cat-hdr" data-toggle="${cat}">
                    <div class="cat-title" data-cat="${cat}">
                        <span class="dot"></span>${label}
                        <em>– ${bt} total</em>
                    </div>
                    <div class="cat-meta">${ws.length} label${ws.length===1?'':'s'} <i class="fas fa-chevron-down chev"></i></div>
                </div>
                <div class="items">${body}</div>
            </div>`;
        }).join('');

        contentEl.querySelectorAll('[data-toggle]').forEach(h => {
            h.addEventListener('click', () => {
                const cat = h.dataset.toggle;
                if (state.collapsed.has(cat)) state.collapsed.delete(cat);
                else state.collapsed.add(cat);
                h.closest('.section').classList.toggle('collapsed');
            });
        });
    }

    function esc(s) {
        return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    // Close matches on outside click
    document.addEventListener('click', e => {
        if (!mform.contains(e.target)) {
            matchesList.style.display = 'none';
        }
    });

    // Escape key: close locker → back to landing
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && lockerEl.style.display !== 'none') {
            backBtn.click();
        }
    });
});
</script>
</body>
</html>
